<link rel="preload" href="{% static 'fonts/barlow-400.woff2' %}" as="font" type="font/woff2" crossorigin />

<link href="{% static 'vendor/datatables/css/dataTables.tailwindcss.min.css' %}" rel="stylesheet"/>

<script src="{% static 'vendor/tailwindcss/browser.js' %}"></script>

<script defer src="{% static 'vendor/lucide/lucide.min.js' %}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    });
</script>
<style type="text/tailwindcss">

          ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono",

      @layer base {
        button:not(:disabled),
        [type="button"]:not(:disabled),
        [type="submit"]:not(:disabled),
        [type="reset"]:not(:disabled),
        [role="button"]:not(:disabled),
        summary {
          cursor: pointer;
        }
        button:disabled,
        [type="button"]:disabled,
        [type="submit"]:disabled,
        [type="reset"]:disabled {
          cursor: not-allowed;
        }
      }

      @font-face {
        font-family: "Barlow";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("{% static 'fonts/barlow-400.woff2' %}") format("woff2");
      }

      @font-face {
