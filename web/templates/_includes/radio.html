<fieldset>
    <legend class="block mb-1 text-sm font-medium text-gray-700">{{ field.label }}:</legend>
    <div class="flex flex-col gap-1">
        {% for choice in field %}
            <label class="flex items-center gap-2 text-sm text-gray-700">
                {{ choice.tag }}
                {{ choice.choice_label }}
            </label>
        {% endfor %}
    </div>
</fieldset>
