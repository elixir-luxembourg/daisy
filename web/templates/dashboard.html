{% extends 'layout.html' %}
{% load static %}
{% load daisy_utils %}

{% block title %}Dashboard | DAISY{% endblock %}

{% block content %}
{% include dashboard_partial %}
{% endblock content %}

{% block js %}
{{ block.super }}
<script>
document.querySelectorAll('[data-paginate]').forEach(list => {
    const size = parseInt(list.dataset.pageSize, 10) || 5;
    const items = Array.from(list.querySelectorAll('[data-paginate-item]'));
    const controls = document.querySelector(`[data-paginate-controls="${list.dataset.paginate}"]`);
    if (items.length <= size || !controls) return;

    const prev = controls.querySelector('[data-paginate-prev]');
    const next = controls.querySelector('[data-paginate-next]');
    const pages = Math.ceil(items.length / size);
    let page = 0;

    list.style.minHeight = list.offsetHeight + 'px';

    function render() {
        items.forEach((el, i) => el.hidden = i < page * size || i >= (page + 1) * size);
    }
    prev.addEventListener('click', () => { if (page > 0) { page--; render(); } });
    next.addEventListener('click', () => { if (page < pages - 1) { page++; render(); } });
});
</script>
{% endblock js %}
