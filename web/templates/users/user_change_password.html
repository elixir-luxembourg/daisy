{% extends 'layout.html' %}

{% block title %}Change password | DAISY{% endblock %}

{% block content %}
    <div class="mt-4 rounded border border-gray-200 bg-white shadow-sm">
        <div class="p-4">
            <h1 class="text-2xl font-light">{% block card_title %}Change password{% endblock %}</h1>
            <div class="mt-2">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include '_includes/forms.html' with cancel_button=go_back_link %}
                </form>
            </div>
        </div>
    </div>
{% endblock %}
